<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINI S.R.L.</title>
    <link rel="shortcut icon" href="images/logon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>CENTINI S.R.L. GESTION PEDIDOS</h1>
    </header>

    <main>
        <section id="carousel-section">
            <h2>Nuestros Productos</h2>
            <div class="carousel-container">
                <div class="carousel-slide">
                    <img src="images/banana.webp" alt="Bebida 1">
                </div>
             
                <div class="carousel-slide">
                    <img src="images/brocoli.webp" alt="Bebida 3">
                </div>



                <div class="carousel-slide">
                    <img src="images/manzana.webp" alt="Bebida 7">
                </div>
                <div class="carousel-slide">
                    <img src="images/naranja.webp" alt="Bebida 8">
                </div>

                <div class="carousel-slide">
                    <img src="images/tomate_redondo.webp" alt="Bebida 10">
                </div>

                <div class="carousel-slide">
                    <img src="images/zanahoria.webp" alt="Bebida 11">
                </div>
            <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="next" onclick="moveSlide(1)">&#10095;</button>
        </section>

        <section id="products-section">
            <h2>Haz tu Pedido</h2>
            <div class="product-grid">
                </div>
        </section>

        <section id="cart-section">
            <h2>Tu Carrito de Compras</h2>
            <div id="cart-items">
                <p>Tu carrito está vacío.</p>
            </div> 
        </section>

        <section id="order-form-section">
            <h2>Detalles del Pedido</h2>
            <form id="order-form">
                <label for="name">Nombre:</label>
                <input type="text" id="name" required>
                <label for="address">Dirección:</label>
                <input type="text" id="address" required>
                <label for="payment-method">Método de Pago:</label>
                <select id="payment-method" required>
                    <option value="ctacte">Cuenta Corriente</option>

                </select>

                <button type="submit" id="send-order-button">Enviar Pedido por WhatsApp</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 BALBUENA JAVIER by Centini S.R.L.. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
